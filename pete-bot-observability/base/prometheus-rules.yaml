apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: pete-bot-alerts
  namespace: observability
spec:
  groups:
  - name: pete-bot.rules
    interval: 30s
    rules:
    - alert: PeteBotDown
      expr: up{job="pete-bot"} == 0
      for: 5m
      labels:
        severity: critical
        layer: tenant
        tenant: pete-bot
      annotations:
        summary: "Pete bot is down"
        description: "Pete bot has been unreachable for more than 5 minutes"

    - alert: PeteBotPodNotReady
      expr: kube_pod_status_ready{pod=~"pete-bot-.*",namespace="pete-bot",condition="false"} == 1
      for: 5m
      labels:
        severity: critical
        layer: tenant
        tenant: pete-bot
      annotations:
        summary: "Pete bot pod {{ $labels.pod }} is not ready"
        description: "Pod has not been ready for more than 5 minutes"

    - alert: PeteBotHighLatency
      expr: histogram_quantile(0.95, rate(discord_bot_request_duration_seconds_bucket[5m])) > 2
      for: 5m
      labels:
        severity: warning
        layer: tenant
        tenant: pete-bot
      annotations:
        summary: "Pete bot has high latency"
        description: "p95 latency is {{ $value | humanizeDuration }}"

    - alert: PeteBotHighMemoryUsage
      expr: container_memory_usage_bytes{pod=~"pete-bot-.*"} / container_spec_memory_limit_bytes{pod=~"pete-bot-.*"} > 0.85
      for: 5m
      labels:
        severity: warning
        layer: tenant
        tenant: pete-bot
      annotations:
        summary: "Pete bot pod {{ $labels.pod }} has high memory usage"
        description: "Memory usage is {{ $value | humanizePercentage }}"

    - alert: PeteBotCrashLooping
      expr: rate(container_last_seen{pod=~"pete-bot-.*"}[15m]) > 0.1
      for: 5m
      labels:
        severity: critical
        layer: tenant
        tenant: pete-bot
      annotations:
        summary: "Pete bot pod {{ $labels.pod }} is crash looping"
        description: "Restart rate: {{ $value | humanize }} per minute"
