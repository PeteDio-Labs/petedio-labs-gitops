          "targets": [
            { "expr": "sum(rate(discord_bot_messages_processed_total{status=\"success\"}[5m])) * 60", "legendFormat": "Success / min", "refId": "A" },
            { "expr": "sum(rate(discord_bot_messages_processed_total{status=\"error\"}[5m])) * 60", "legendFormat": "Errors / min", "refId": "B" }
