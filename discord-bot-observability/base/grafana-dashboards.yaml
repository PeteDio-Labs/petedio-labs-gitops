            { "expr": "histogram_quantile(0.95, sum(rate(discord_bot_request_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p95", "refId": "B" },
            { "expr": "histogram_quantile(0.99, sum(rate(discord_bot_request_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p99", "refId": "C" }
          ],
          "title": "Command Duration Percentiles (p50 / p95 / p99)",
