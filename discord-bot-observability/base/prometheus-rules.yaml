apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: discord-bot-alerts
  namespace: observability
spec:
  groups:
  - name: discord-bot.rules
    interval: 30s
    rules:
    - alert: DiscordBotDown
      expr: up{job="discord-bot"} == 0
      for: 5m
      labels:
        severity: critical
        layer: tenant
        tenant: discord-bot
      annotations:
        summary: "Discord bot is down"
        description: "Discord bot has been unreachable for more than 5 minutes"

    - alert: DiscordBotPodNotReady
      expr: kube_pod_status_ready{pod=~"discord-bot-.*",namespace="discord-bot",condition="false"} == 1
      for: 5m
      labels:
        severity: critical
        layer: tenant
        tenant: discord-bot
      annotations:
        summary: "Discord bot pod {{ $labels.pod }} is not ready"
        description: "Pod has not been ready for more than 5 minutes"

    - alert: DiscordBotHighLatency
      expr: histogram_quantile(0.95, rate(discord_bot_request_duration_seconds_bucket[5m])) > 2
      for: 5m
      labels:
        severity: warning
        layer: tenant
        tenant: discord-bot
      annotations:
        summary: "Discord bot has high latency"
        description: "p95 latency is {{ $value | humanizeDuration }}"

    - alert: DiscordBotHighMemoryUsage
      expr: container_memory_usage_bytes{pod=~"discord-bot-.*"} / container_spec_memory_limit_bytes{pod=~"discord-bot-.*"} > 0.85
      for: 5m
      labels:
        severity: warning
        layer: tenant
        tenant: discord-bot
      annotations:
        summary: "Discord bot pod {{ $labels.pod }} has high memory usage"
        description: "Memory usage is {{ $value | humanizePercentage }}"

    - alert: DiscordBotCrashLooping
      expr: rate(container_last_seen{pod=~"discord-bot-.*"}[15m]) > 0.1
      for: 5m
      labels:
        severity: critical
        layer: tenant
        tenant: discord-bot
      annotations:
        summary: "Discord bot pod {{ $labels.pod }} is crash looping"
        description: "Restart rate: {{ $value | humanize }} per minute"
