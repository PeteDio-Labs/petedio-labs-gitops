apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mission-control-observability
  namespace: argocd
  labels:
    layer: tenant
    tenant: mission-control
    environment: shared
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: mission-control
  source:
    repoURL: https://github.com/petedillo/mission-control-gitops.git
    targetRevision: main
    path: kubernetes/observability/base
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
