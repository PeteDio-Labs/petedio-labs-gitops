apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: blog-prod
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: blog-api=docker.toastedbytes.com/blog-api:main-latest, blog-ui=docker.toastedbytes.com/blog-ui:main-latest
    argocd-image-updater.argoproj.io/blog-api.update-strategy: digest
    argocd-image-updater.argoproj.io/blog-ui.update-strategy: digest
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: default

  source:
    repoURL: https://github.com/PeteDio-Labs/blog-gitops.git
    targetRevision: HEAD
    path: kubernetes/overlays/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: blog-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - RespectIgnoreDifferences=false
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 10
