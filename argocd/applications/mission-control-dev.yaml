apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mission-control-dev
  namespace: argocd
  annotations:
    # ArgoCD Image Updater configuration
    argocd-image-updater.argoproj.io/image-list: backend=docker.toastedbytes.com/mission-control-backend:develop-latest, frontend=docker.toastedbytes.com/mission-control-web:develop-latest, notifier=docker.toastedbytes.com/notification-service:develop-latest
    argocd-image-updater.argoproj.io/backend.update-strategy: digest
    argocd-image-updater.argoproj.io/frontend.update-strategy: digest
    argocd-image-updater.argoproj.io/notifier.update-strategy: digest
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
    argocd-image-updater.argoproj.io/write-back-target: kustomization
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: mission-control

  source:
    repoURL: https://github.com/petedillo/mission-control-gitops.git
    targetRevision: main
    path: kubernetes/overlays/dev

  destination:
    server: https://kubernetes.default.svc
    namespace: mission-control

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
    - CreateNamespace=true
    - PrunePropagationPolicy=foreground
    - PruneLast=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 10
