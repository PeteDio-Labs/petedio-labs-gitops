apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: portfolio
  namespace: argocd
  annotations:
    # ArgoCD Image Updater — track main tag, digest write-back to GitOps
    argocd-image-updater.argoproj.io/image-list: portfolio=docker.pdlab.dev/portfolio:main-latest
    argocd-image-updater.argoproj.io/portfolio.update-strategy: digest
    argocd-image-updater.argoproj.io/write-back-method: git
    argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: default

  source:
    repoURL: https://github.com/PeteDio-Labs/portfolio-gitops.git
    targetRevision: HEAD
    path: kubernetes/overlays/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: portfolio

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - RespectIgnoreDifferences=false
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  revisionHistoryLimit: 10
