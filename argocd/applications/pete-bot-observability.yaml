apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pete-bot-observability
  namespace: argocd
  labels:
    layer: tenant
    tenant: pete-bot
    environment: prod
spec:
  project: default
  source:
    repoURL: https://github.com/PeteDio-Labs/petedio-labs-gitops
    targetRevision: HEAD
    path: pete-bot-observability/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
