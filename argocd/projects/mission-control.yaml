apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: mission-control
  namespace: argocd
spec:
  description: Mission Control - LLM-powered homelab management

  sourceRepos:
  - 'https://github.com/PeteDio-Labs/mission-control-gitops.git'

  destinations:
  - namespace: mission-control
    server: https://kubernetes.default.svc
  - namespace: observability
    server: https://kubernetes.default.svc

  clusterResourceWhitelist:
  - group: ''
    kind: Namespace

  namespaceResourceWhitelist:
  - group: ''
    kind: '*'
  - group: 'apps'
    kind: '*'
  - group: 'networking.k8s.io'
    kind: '*'
  - group: 'batch'
    kind: '*'
  - group: 'monitoring.coreos.com'
    kind: '*'
  - group: 'bitnami.com'
    kind: SealedSecret

  roles:
  - name: mc-backend
    description: MC Backend service account for read + sync operations
    policies:
    - p, proj:mission-control:mc-backend, applications, get, mission-control/*, allow
    - p, proj:mission-control:mc-backend, applications, sync, mission-control/*, allow

