apiVersion: v1
kind: ConfigMap
metadata:
  name: searxng-config
data:
  settings.yml: |
    use_default_settings: true
    server:
      secret_key: "change-me-in-production"
      limiter: false
      image_proxy: false
      port: 8080
      bind_address: "0.0.0.0"
    search:
      safe_search: 0
      formats:
        - html
        - json
    engines:
      - name: google
        disabled: false
      - name: bing
        disabled: false
      - name: duckduckgo
        disabled: false
      - name: wikipedia
        disabled: false
