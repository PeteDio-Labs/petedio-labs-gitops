apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: blog-app-alerts
  namespace: observability
spec:
  groups:
  - name: blog-application.rules
    interval: 30s
    rules:
    - alert: BlogHighMemoryUsage
      expr: container_memory_usage_bytes{pod=~"blog-.*"} / container_spec_memory_limit_bytes{pod=~"blog-.*"} > 0.9
      for: 5m
      labels:
        severity: warning
        layer: tenant
        tenant: blog
      annotations:
        summary: "Blog pod {{ $labels.pod }} has high memory usage"
        description: "Memory usage is {{ $value | humanizePercentage }}"

    - alert: BlogPodCrashLooping
      expr: rate(container_last_seen{pod=~"blog-.*"}[15m]) > 0.1
      for: 5m
      labels:
        severity: warning
        layer: tenant
        tenant: blog
      annotations:
        summary: "Blog pod {{ $labels.pod }} is crash looping"
        description: "Restart rate: {{ $value | humanize }} per minute"

    - alert: BlogHighDatabaseConnections
      expr: pg_stat_activity_count{namespace=~"blog-.*"} > 90
      for: 5m
      labels:
        severity: warning
        layer: tenant
        tenant: blog
      annotations:
        summary: "Blog database has high connection count"
        description: "Active connections: {{ $value }}"

    - alert: BlogAPIHighErrorRate
      expr: rate(nginx_ingress_controller_requests{ingress=~"blog-.*",status=~"5.."}[5m]) > 0.05
      for: 5m
      labels:
        severity: warning
        layer: tenant
        tenant: blog
      annotations:
        summary: "Blog API error rate is high"
        description: "5xx error rate: {{ $value | humanizePercentage }}"
