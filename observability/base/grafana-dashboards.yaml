apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: observability
data:
  dashboard-import-script.sh: |
    #!/bin/bash
    # This script documents the dashboards to import
    # Import these via Grafana UI or via provisioning
    
    # Kubernetes Cluster Monitoring (ID: 7249)
    # Shows: CPU, Memory, Disk, Network across all nodes
    
    # Kubernetes Pod Monitoring (ID: 6417)
    # Shows: Per-pod resource usage, container restart tracking, limits
    
    # NGINX Ingress Controller (ID: 9614)
    # Shows: Request rates, response codes, latency percentiles
    
    # PostgreSQL Database (ID: 9628)
    # Shows: Connections, queries, locks, database size, transactions
