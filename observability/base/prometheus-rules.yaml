apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: blog-alerts
  namespace: observability
spec:
  groups:
  - name: infrastructure.rules
    interval: 30s
    rules:
    
    # Node Down Alert
    - alert: NodeDown
      expr: up{job="prometheus-node-exporter"} == 0
      for: 5m
      labels:
        severity: critical
        component: infrastructure
      annotations:
        summary: "Node {{ $labels.node }} is down"
        description: "Node {{ $labels.node }} ({{ $labels.instance }}) has been unreachable for more than 5 minutes."
    
    # High Memory Usage Alert
    - alert: HighMemoryUsage
      expr: |
        (container_memory_usage_bytes{namespace="dev"} / container_spec_memory_limit_bytes{namespace="dev"}) > 0.9
      for: 5m
      labels:
        severity: warning
        component: pod
      annotations:
        summary: "High memory usage on pod {{ $labels.pod }}"
        description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} memory usage is above 90% (current: {{ humanizePercentage $value }})"
    
    # Disk Space Alert
    - alert: HighDiskUsage
      expr: |
        (node_filesystem_avail_bytes{fstype=~"ext4|xfs"} / node_filesystem_size_bytes{fstype=~"ext4|xfs"}) < 0.15
      for: 5m
      labels:
        severity: warning
        component: infrastructure
      annotations:
        summary: "High disk usage on node {{ $labels.node }}"
        description: "Node {{ $labels.node }} has only {{ humanizePercentage $value }} disk space available"
    
    # Pod CrashLooping Alert
    - alert: PodCrashLooping
      expr: |
        rate(kube_pod_container_status_restarts_total{namespace="dev"}[15m]) > 0.1
      for: 5m
      labels:
        severity: warning
        component: pod
      annotations:
        summary: "Pod {{ $labels.pod }} is crash looping"
        description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has restarted {{ $value | humanize }} times in the last 15 minutes"
    
    # Database Connection Alert
    - alert: HighDatabaseConnections
      expr: |
        pg_stat_activity_count{namespace="dev"} > 90
      for: 5m
      labels:
        severity: warning
        component: database
      annotations:
        summary: "High database connection count"
        description: "PostgreSQL has {{ $value | humanize }} active connections (threshold: 90)"
    
    # API High Error Rate
    - alert: APIHighErrorRate
      expr: |
        (sum(rate(nginx_requests_total{status=~"5..",ingress="blog-api"}[5m])) by (ingress)) / 
        (sum(rate(nginx_requests_total{ingress="blog-api"}[5m])) by (ingress)) > 0.05
      for: 5m
      labels:
        severity: warning
        component: api
      annotations:
        summary: "Blog API has high error rate"
        description: "Blog API error rate is {{ humanizePercentage $value }} (threshold: 5%)"
    
    # Prometheus TargetDown
    - alert: PrometheusTargetDown
      expr: up{job="kubernetes-apiservers"} == 0
      for: 5m
      labels:
        severity: critical
        component: monitoring
      annotations:
        summary: "Prometheus target {{ $labels.job }} is down"
        description: "Target {{ $labels.instance }} for job {{ $labels.job }} has been down for more than 5 minutes"
