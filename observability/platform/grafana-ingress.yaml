apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: observability
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # Cloudflare fronts client TLS; origin serves HTTP. Without ssl-redirect=false,
    # nginx 308s to https://grafana.pdlab.dev which loops back through Cloudflare.
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: grafana.pdlab.dev
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: kube-prom-stack-grafana
            port:
              number: 80
  tls:
  - hosts:
    - grafana.pdlab.dev
    secretName: grafana-tls
