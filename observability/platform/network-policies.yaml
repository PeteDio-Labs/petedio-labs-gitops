apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-egress-scrape
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - port: 9090
        - port: 9091
        - port: 8080
        - port: 3000
        - port: 3002
        - port: 3003
        - port: 9100
    - to:
        - ipBlock:
            cidr: 10.152.183.0/24  # ClusterIPs (K8s API server for service discovery)
        - ipBlock:
            cidr: 192.168.50.0/24  # LAN (MicroK8s node API endpoint + kubelet)
      ports:
        - port: 443
        - port: 16443
        - port: 10250  # kubelet metrics
        - port: 9100   # node-exporter (host network)
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-ingress-query
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mission-control-prod
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: mission-control
      ports:
        - port: 9090
---
