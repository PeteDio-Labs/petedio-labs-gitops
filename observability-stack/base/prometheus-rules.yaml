apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: infrastructure-alerts
  namespace: observability
spec:
  groups:
  - name: infrastructure.rules
    interval: 30s
    rules:
    - alert: NodeDown
      expr: up{job="prometheus-node-exporter"} == 0
      for: 5m
      labels:
        severity: critical
        layer: platform
      annotations:
        summary: "Node {{ $labels.node }} is down"
        description: "Node exporter has been unreachable for more than 5 minutes"

    - alert: HighDiskUsage
      expr: (node_filesystem_avail_bytes / node_filesystem_size_bytes) < 0.15
      for: 5m
      labels:
        severity: warning
        layer: platform
      annotations:
        summary: "High disk usage on {{ $labels.node }}"
        description: "Disk usage is {{ $value | humanizePercentage }} available"

    - alert: PrometheusTargetDown
      expr: up{job="kubernetes-apiservers"} == 0
      for: 5m
      labels:
        severity: critical
        layer: platform
      annotations:
        summary: "Prometheus target down: {{ $labels.job }}"
        description: "Prometheus cannot reach {{ $labels.job }} for more than 5 minutes"
