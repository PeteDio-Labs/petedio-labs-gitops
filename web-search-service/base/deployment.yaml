apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-search-service
  labels:
    app: web-search-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-search-service
  template:
    metadata:
      labels:
        app: web-search-service
    spec:
      imagePullSecrets:
      - name: nexus-registry
      containers:
      - name: web-search-service
        image: docker.pdlab.dev/web-search-service:main-latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3003
          name: http
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "3003"
        - name: LOG_LEVEL
          value: "info"
        - name: SEARXNG_URL
          value: "http://searxng.web-search.svc.cluster.local:8080"
        envFrom:
        - configMapRef:
            name: web-search-service-config
        - secretRef:
            name: web-search-api-keys
            optional: true
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /health/live
            port: 3003
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3003
          initialDelaySeconds: 5
          periodSeconds: 5
