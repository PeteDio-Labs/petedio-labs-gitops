          "gridPos": { "h": 8, "w": 8, "x": 16, "y": 32 },
          "id": 32,
          "options": { "legend": { "calcs": ["mean", "max", "last"], "displayMode": "table", "placement": "bottom", "showLegend": true }, "tooltip": { "mode": "multi", "sort": "desc" } },
          "targets": [
            { "expr": "histogram_quantile(0.95, sum(rate(web_search_api_request_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p95", "refId": "A" },
            { "expr": "histogram_quantile(0.99, sum(rate(web_search_api_request_duration_seconds_bucket[5m])) by (le))", "legendFormat": "p99", "refId": "B" }
          ],
